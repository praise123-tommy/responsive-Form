<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tommy's 3D Dimension</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes move-twinkle {
      from { transform: translateY(0px); }
      to { transform: translateY(-1000px); }
    }
    .star-layer {
      animation: move-twinkle 60s linear infinite;
    }
    .tilt-card { perspective: 1000px; }
    .tilt-inner {
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform-style: preserve-3d;
    }
    /* Subtle 3D tilt on hover */
    .tilt-card:hover .tilt-inner {
      transform: rotateX(8deg) rotateY(4deg) scale(1.02);
    }
  </style>
</head>
<body class="bg-[#020617] flex min-h-screen items-center justify-center overflow-hidden font-sans">

  <div class="fixed inset-0 z-0 opacity-40">
    <div class="star-layer absolute inset-0 bg-[radial-gradient(#fff_1.2px,transparent_1.2px)] [background-size:50px_50px]"></div>
    <div class="star-layer absolute inset-0 bg-[radial-gradient(#fff_0.8px,transparent_0.8px)] [background-size:80px_80px] opacity-50" style="animation-duration: 100s;"></div>
  </div>

  <div class="tilt-card relative z-10 w-full max-w-md p-4">
    <div class="tilt-inner group relative overflow-hidden rounded-[2rem] p-[3px]">
      
      <div class="absolute inset-[-500%] animate-[spin_4s_linear_infinite] group-hover:animate-[spin_1.5s_linear_infinite] bg-[conic-gradient(from_0deg,transparent_0deg,transparent_150deg,#22d3ee_180deg,transparent_210deg,transparent_320deg,#a855f7_360deg)]"></div>

      <div class="relative flex flex-col justify-center rounded-[30px] bg-slate-950/90 backdrop-blur-3xl px-10 py-12 shadow-[0_0_50px_rgba(34,211,238,0.15)] border border-white/5">
        
        <h2 class="mb-2 text-center text-4xl font-black tracking-tighter text-white drop-shadow-2xl">
          ACCESS
        </h2>
        <p class="mb-10 text-center text-slate-500 text-[10px] font-bold tracking-[0.3em] uppercase">
          Neural Interface <span class="text-purple-500 text-lg">●</span> Active
        </p>

        <form class="space-y-8">
          <div class="group/input relative">
            <input type="text" required class="peer w-full border-b-2 border-slate-800 bg-transparent py-2 text-white outline-none transition-all focus:border-cyan-400 placeholder-transparent" id="user" placeholder="Username" />
            <label for="user" class="absolute left-0 -top-5 text-xs text-cyan-400 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-slate-500 peer-placeholder-shown:top-2 peer-focus:-top-5 peer-focus:text-xs peer-focus:text-cyan-400">Username</label>
          </div>

          <div class="group/input relative">
            <input type="password" required class="peer w-full border-b-2 border-slate-800 bg-transparent py-2 text-white outline-none transition-all focus:border-purple-500 placeholder-transparent" id="pass" placeholder="Password" />
            <label for="pass" class="absolute left-0 -top-5 text-xs text-purple-400 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-slate-500 peer-placeholder-shown:top-2 peer-focus:-top-5 peer-focus:text-xs peer-focus:text-purple-400">Password</label>
          </div>

          <div class="relative pt-4">
             <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 to-purple-600 blur-xl opacity-20 group-hover:opacity-60 transition-opacity"></div>
             <button class="relative w-full rounded-2xl bg-gradient-to-r from-cyan-500 to-purple-600 py-4 font-black text-white shadow-2xl transition-all hover:scale-[1.05] active:scale-[0.95] tracking-widest">
              INITIALIZE
            </button>
          </div>
        </form>

        <div class="mt-8 flex items-center justify-between text-[9px] font-bold uppercase tracking-widest text-slate-600">
          <div class="flex items-center gap-2">
            <div class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></div>
            System Online
          </div>
          <span>Ref: TOMMY_01</span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
